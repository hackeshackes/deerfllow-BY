# Dev override for backend gateway.
# Uses the `dev` target of backend/Dockerfile (retains builder toolchain so
# `uv sync` can install source distributions at container start) and bind
# mounts the live backend/ source from the host into the container. Code
# changes show up after `docker compose restart gateway`.
#
# Usage (from repo root):
#   docker compose -f docker/docker-compose.yaml -f docker/docker-compose.dev.yaml up -d gateway
#
# We keep using -f docker/docker-compose.yaml as the base so the other
# containers (frontend / langgraph / nginx / provisioner) come from the
# same canonical definition.
#
# Notes on volumes:
# - We bind-mount backend/ over /app/backend (live source).
# - Container creates a fresh .venv on each start (uv sync).
# - The named volume overrides the bind-mount only for /app/backend/.venv,
#   giving us dependency caching across restarts.
# - Other bind mounts from the base file (config.yaml etc.) MUST come last so
#   they overlay correctly. We override `volumes:` entirely to be explicit
#   about ordering — `longer-syntax` mount entries appear in order, later
#   wins for path collisions.
services:
  gateway:
    build:
      context: ../
      dockerfile: backend/Dockerfile
      target: dev   # keep uv toolchain; CMD runs `uv run` which triggers `uv sync` on start
    command: sh -c "cd backend && PYTHONPATH=. uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 --workers 4"
    environment:
      # v1.5.9: opt into SQLite-backed comment persistence.
      # Accepted values: "memory" (default in v1.5.8) or "sqlite".
      # When "sqlite", MICX_COMMENTS_DB controls the path (default
      # `.deer-flow/comments.db`, which is bind-mounted to host).
      MICX_COMMENTS_STORE: ${MICX_COMMENTS_STORE:-memory}
    volumes:
      # Named venv (dependency cache) first → the .venv is persisted across restarts.
      - type: volume
        source: deer-flow-gateway-venv
        target: /app/backend/.venv
      # Live source after — covers the rest of the bind mounts in the base file
      # because docker compose merges with later declarations winning.
      - type: bind
        source: ../backend
        target: /app/backend
      # Base-file volume mounts (config.yaml / extensions_config.json / skills / .deer-flow)
      # are kept implicitly because we don't override the volumes section but
      # inherited from the base; if docker compose flags a conflict, copy them
      # from docker-compose.yaml verbatim.

volumes:
  deer-flow-gateway-venv:
